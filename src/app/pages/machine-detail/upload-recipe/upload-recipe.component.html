<!-- Backdrop -->
<div *ngIf="open" class="popup-overlay" (click)="onClose()"></div>

<!-- Center container -->
<div *ngIf="open" class="popup-container" (click)="$event.stopPropagation()">
  <!--  SINGLE CARD (header + body ภายในกล่องเดียว) -->
  <div class="popup-window">

    <!-- Header (fixed in card) -->
    <div class="popup-header">
      <div class="popup-title">
        <h2>Upload Recipe</h2>
        <span class="popup-badge">PPC</span>
      </div>

      <button class="close-btn" type="button" (click)="onClose()">
        <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Body (scrolls) -->
    <div class="popup-body">
      <div class="content-wrapper" [class.loading]="loading">

        <!-- MAIN -->
        <div class="main-content">
          <!-- Alerts -->
          <div *ngIf="success" class="alert alert-success">{{ success }}</div>
          <div *ngIf="error" class="alert alert-error">{{ error }}</div>

          <!-- Equipment -->
          <section class="form-section">
            <h3 class="section-title">
              <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
              </svg>
              Equipment
            </h3>
            <div class="field-group">
              <div class="field">
                <label class="field-label">Equipment ID</label>
                <input class="field-input" type="text" [value]="equipID" readonly>
              </div>
              <div class="field">
                <label class="field-label">Type</label>
                <input class="field-input" type="text" [formControl]="form.controls.type" placeholder="Enter type">
              </div>
              <div class="field">
                <label class="field-label">Model</label>
                <input class="field-input" type="text" [formControl]="form.controls.model" placeholder="Enter model">
              </div>
              <div class="field">
                <label class="field-label">S/W Rev</label>
                <input class="field-input" type="text" [formControl]="form.controls.swRev" placeholder="Enter software revision">
              </div>
            </div>
          </section>

          <!-- Recipe Details -->
          <section class="form-section">
            <h3 class="section-title">
              <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
              </svg>
              Recipe Details
            </h3>

            <!-- Recipe Filename -->
            <div class="field">
              <label class="field-label">Recipe Filename</label>
              <input
                class="field-input"
                type="text"
                [formControl]="form.controls.recipeFilename"
                placeholder="Enter Recipe Filename" />
            </div>

            <!-- Basics -->
            <div class="field-group">
              <div class="field">
                <label class="field-label">Recipe Name</label>
                <input id="recipeNameInput" class="field-input" type="text"
                       [formControl]="form.controls.recipeName" placeholder="EQ-001-STD" required>
              </div>
              <div class="field">
                <label class="field-label">Auto Load Option</label>
                <input class="field-input" type="text" [formControl]="form.controls.autoLoad" placeholder="Enter option">
              </div>
              <div class="field">
                <label class="field-label">UTAC Lot ID</label>
                <input class="field-input" type="text" [formControl]="form.controls.utacLotId" placeholder="Enter lot ID">
              </div>
              <div class="field">
                <label class="field-label">Reference BOM</label>
                <input class="field-input" type="text" [formControl]="form.controls.referenceBom" placeholder="Enter BOM reference">
              </div>
              <div class="field">
                <label class="field-label">Die Sequence</label>
                <select class="field-input" [formControl]="form.controls.dieSeq">
                  <option [ngValue]="null">Select sequence</option>
                  <option *ngFor="let d of dieSeqOptions" [ngValue]="d">{{ d }}</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label">Die ID</label>
                <select class="field-input" [formControl]="form.controls.dieId">
                  <option [ngValue]="null">Select ID</option>
                  <option *ngFor="let d of dieIdOptions" [ngValue]="d">{{ d }}</option>
                </select>
              </div>
              <div class="field">
                <label class="field-label">Wafer Size (AL)</label>
                <input class="field-input" type="text" [formControl]="form.controls.waferSizeAl" placeholder="Enter size">
              </div>
              <div class="field">
                <label class="field-label">Wafer Size (MC)</label>
                <input class="field-input" type="text" [formControl]="form.controls.waferSizeMc" placeholder="Enter size">
              </div>
            </div>

            <!-- Folder -->
            <div class="field">
              <label class="field-label">Folder</label>
              <div class="folder-grid">
                <label class="folder-option folder-production">
                  <input type="radio" [value]="'PRODUCTION'" [formControl]="form.controls.folder"> PRODUCTION
                </label>
                <label class="folder-option folder-qual">
                  <input type="radio" [value]="'QUAL'" [formControl]="form.controls.folder"> QUAL
                </label>
                <label class="folder-option folder-process">
                  <input type="radio" [value]="'PROCESS'" [formControl]="form.controls.folder"> PROCESS
                </label>
                <label class="folder-option folder-equipment">
                  <input type="radio" [value]="'EQUIPMENT'" [formControl]="form.controls.folder"> EQUIPMENT
                </label>
                <label class="folder-option folder-rnd">
                  <input type="radio" [value]="'R&D'" [formControl]="form.controls.folder"> R&D
                </label>
                <label class="folder-option folder-swr">
                  <input type="radio" [value]="'SWR'" [formControl]="form.controls.folder"> SWR
                </label>
              </div>
            </div>

            <!-- Toggles -->
            <div class="toggle-group">
              <div class="toggle-field">
                <span class="toggle-label">Upload as GOLDEN</span>
                <div class="toggle-options">
                  <label class="toggle-option"><input type="radio" [value]="true"  [formControl]="form.controls.uploadAsGolden"> Yes</label>
                  <label class="toggle-option"><input type="radio" [value]="false" [formControl]="form.controls.uploadAsGolden"> No</label>
                </div>
              </div>
              <div class="toggle-field">
                <span class="toggle-label">Release for Download</span>
                <div class="toggle-options">
                  <label class="toggle-option"><input type="radio" [value]="true"  [formControl]="form.controls.releaseForDownload"> Yes</label>
                  <label class="toggle-option"><input type="radio" [value]="false" [formControl]="form.controls.releaseForDownload"> No</label>
                </div>
              </div>
              <div class="toggle-field">
                <span class="toggle-label">Frozen Recipe</span>
                <div class="toggle-options">
                  <label class="toggle-option"><input type="radio" [value]="true"  [formControl]="form.controls.frozenRecipe"> Yes</label>
                  <label class="toggle-option"><input type="radio" [value]="false" [formControl]="form.controls.frozenRecipe"> No</label>
                </div>
              </div>
              <div class="field">
                <label class="field-label">Process Specification</label>
                <input class="field-input" type="text" [formControl]="form.controls.processSpec" placeholder="Enter specification">
              </div>
            </div>
          </section>

          <!-- Created / Verified / Revision / Stock -->
          <section class="form-section">
            <h3 class="section-title">
              <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
              </svg>
              Created By
            </h3>
            <div class="field-group">
              <div class="field">
                <label class="field-label">Employee ID</label>
                <input class="field-input" type="text" [formControl]="form.controls.createdBy" placeholder="Enter employee ID">
              </div>
            </div>
          </section>

          <section class="form-section">
            <h3 class="section-title">
              <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            Verified By
            </h3>
            <div class="field-group">
              <div class="field">
                <label class="field-label">Employee ID</label>
                <input class="field-input" type="text" [formControl]="form.controls.verifiedBy" placeholder="Enter employee ID">
              </div>
              <div class="field">
                <label class="field-label">Password</label>
                <input class="field-input" type="password" [formControl]="form.controls.verifiedPass" placeholder="Enter password">
              </div>
            </div>
          </section>

          <section class="form-section">
            <h3 class="section-title">
              <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Revision History <span style="color:#64748b;font-weight:400;">(100 chars left)</span>
            </h3>
            <div class="field">
              <textarea class="field-input" rows="3" [formControl]="form.controls.revision" placeholder="Enter revision notes..."></textarea>
            </div>
          </section>

          <section class="form-section">
            <h3 class="section-title">
              <svg class="section-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/>
              </svg>
              Verified Blade Production Stock
            </h3>
            <div class="field-group">
              <div class="field">
                <label class="field-label">SAW Blade Z1</label>
                <input class="field-input" type="text" [formControl]="form.controls.z1" placeholder="Enter Z1 value">
              </div>
              <div class="field">
                <label class="field-label">SAW Blade Z2</label>
                <input class="field-input" type="text" [formControl]="form.controls.z2" placeholder="Enter Z2 value">
              </div>
            </div>
          </section>
        </div>

        <!-- SIDEBAR -->
        <div class="sidebar">
          <div class="action-buttons">
            <!-- Upload = Green -->
            <button class="btn btn-primary" type="button"
                    (click)="submit()" [disabled]="loading || form.invalid">
              <span *ngIf="loading" class="spinner"></span>
              <span *ngIf="!loading">Upload Recipe</span>
            </button>
            <button class="btn btn-warning" type="button" (click)="clear()">Clear Form</button>
            <button class="btn btn-secondary" type="button">View PPC</button>
            <button class="btn btn-danger" type="button" (click)="onClose()">Cancel</button>
          </div>
          
          <div class="warning-card">
            <div class="warning-title">⚠️ WARNING</div>
            <div class="warning-text">
              All other machine-specific recipes with this name will be deleted!
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>
